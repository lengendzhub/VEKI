version: "3.9"

services:
  backend:
    build: {context: .., dockerfile: infra/Dockerfile}
    env_file: ../backend/.env
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    restart: unless-stopped

  worker:
    build: {context: .., dockerfile: infra/Dockerfile.worker}
    env_file: ../backend/.env
    depends_on: [postgres, redis, backend]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quantai
      POSTGRES_USER: quantai
      POSTGRES_PASSWORD: quantai
    volumes: [pg_data:/var/lib/postgresql/data]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes: [redis_data:/data]
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [backend]
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
